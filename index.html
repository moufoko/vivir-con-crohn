<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Vivir con Crohn · Juego educativo 16-bit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --c-bg1:#1a1c2c; --c-bg2:#3b2c5a;
    --c-panel:#41394e; --c-panel2:#2b2640;
    --c-frame:#f4f4f4; --c-frame-dark:#94a1b2;
    --c-good:#38b764; --c-good2:#a7f070;
    --c-warn:#ffcd75; --c-bad:#ef476f; --c-bad2:#b13e53;
    --c-blue:#41a6f6; --c-blue2:#3978a8;
    --c-text:#fffce8; --c-ink:#1a1c2c;
    --c-purple:#a36bf0; --c-pink:#ff77a8; --c-cdai:#ff5470;
    --font:"Press Start 2P", "Courier New", monospace;
  }
  *{box-sizing:border-box; -webkit-font-smoothing:none; image-rendering:pixelated;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:var(--font);
    background:
      radial-gradient(circle at 20% 10%, #5d3a9b33, transparent 50%),
      radial-gradient(circle at 80% 90%, #38b76433, transparent 50%),
      linear-gradient(160deg,var(--c-bg1),var(--c-bg2));
    color:var(--c-text);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:14px;
  }
  /* ---- SNES screen frame ---- */
  #console{
    width:min(900px,100%);
  }
  #screen{
    position:relative;
    background:#11121e;
    border:6px solid var(--c-frame);
    border-radius:10px;
    box-shadow:0 0 0 6px #2b2640, 0 14px 0 6px #00000066, 0 0 40px #00000099;
    overflow:hidden;
    aspect-ratio:4/3;
    min-height:480px;
  }
  .scanlines:after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg,#0000 0 2px,#00000022 2px 3px);
    mix-blend-mode:multiply; z-index:50;
  }
  .view{position:absolute; inset:0; display:flex; flex-direction:column;}
  /* ---- typography helpers ---- */
  .px{font-family:var(--font);}
  h1,h2,h3{margin:0; line-height:1.5; text-shadow:2px 2px 0 #00000088;}
  p{line-height:1.7;}
  .tiny{font-size:8px;}
  .small{font-size:9px;}
  .mid{font-size:11px;}
  .big{font-size:15px;}
  /* ---- HUD ---- */
  #hud{
    display:flex; flex-wrap:wrap; gap:6px 10px; align-items:center;
    padding:8px 10px; background:linear-gradient(#2b2640,#221d33);
    border-bottom:3px solid #11121e; font-size:8px;
  }
  #hud .wk{color:var(--c-warn); white-space:nowrap;}
  #hud .ap{color:var(--c-good2); white-space:nowrap;}
  #hud .phase{margin-left:auto; padding:3px 6px; border-radius:4px; white-space:nowrap;}
  .ph-rem{background:var(--c-good); color:#06321a;}
  .ph-leve{background:var(--c-warn); color:#5a3d00;}
  .ph-mod{background:#ff924c; color:#4a1d00;}
  .ph-grave{background:var(--c-bad); color:#3a0010;}
  /* ---- stat bars ---- */
  #bars{display:grid; grid-template-columns:1fr 1fr; gap:5px 12px; padding:8px 10px; background:#1d1a2e;}
  .bar{display:flex; align-items:center; gap:6px; font-size:8px;}
  .bar .lbl{width:74px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .bar .track{flex:1; height:12px; background:#0d0d16; border:2px solid #000; border-radius:3px; overflow:hidden; position:relative;}
  .bar .fill{height:100%; width:50%; transition:width .35s ease;}
  .bar .num{width:34px; text-align:right; font-size:8px;}
  /* ---- main stage ---- */
  #stage{flex:1; display:flex; flex-direction:column; min-height:0;}
  #scene{
    flex:1; display:flex; align-items:center; justify-content:center; gap:14px;
    position:relative; overflow:hidden; min-height:90px;
    transition:background .5s;
  }
  .scene-spring{background:linear-gradient(#bde6ff,#dff7c8 70%,#8fd96a);}
  .scene-summer{background:linear-gradient(#ffe9a8,#ffd36b 70%,#7bd06b);}
  .scene-autumn{background:linear-gradient(#ffd9a0,#ffae6b 70%,#c98b46);}
  .scene-winter{background:linear-gradient(#cfe9ff,#eef6ff 70%,#bcd3e6);}
  .scene-flare{background:linear-gradient(#ffd0d0,#ff9a9a 70%,#e06060)!important; animation:flarepulse 1.2s infinite alternate;}
  @keyframes flarepulse{from{filter:brightness(1);}to{filter:brightness(1.12);}}
  .sprite{font-size:62px; filter:drop-shadow(3px 4px 0 #00000044); animation:bob 1.6s infinite ease-in-out;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  .deco{font-size:34px; opacity:.9; animation:bob 2.4s infinite ease-in-out;}
  /* ---- sprites pixel-art dibujados ---- */
  .psp{image-rendering:pixelated; display:inline-block; vertical-align:middle; filter:drop-shadow(2px 3px 0 #00000033);}
  .psp.bob{animation:bob 1.6s infinite ease-in-out;}
  .psp.bob2{animation:bob 2.4s infinite ease-in-out;}
  .foodcard .e{min-height:46px; display:flex; align-items:center; justify-content:center;}
  button.btn.foodbtn{display:flex; align-items:center; gap:10px; line-height:1.3;}
  button.btn.foodbtn .fn{flex:1;}
  button.btn.foodbtn .psp{filter:drop-shadow(1px 2px 0 #00000044);}
  /* ---- text/dialog box ---- */
  #box{
    background:#15131f; border-top:4px solid var(--c-frame);
    padding:11px 13px; min-height:120px; max-height:48%; overflow:auto;
  }
  #box .speaker{color:var(--c-warn); font-size:9px; margin-bottom:7px;}
  #box .text{font-size:10px; line-height:1.85;}
  #box .text b{color:var(--c-good2);}
  #box .text .bad{color:var(--c-pink);}
  #box .text .info{color:var(--c-blue);}
  /* ---- menu / buttons ---- */
  #menu{padding:9px 11px; display:flex; flex-wrap:wrap; gap:7px; background:#11121e; border-top:3px solid #2b2640;}
  button.btn{
    font-family:var(--font); font-size:9px; cursor:pointer;
    color:var(--c-text); background:linear-gradient(#4b4368,#332c4d);
    border:none; border-radius:5px; padding:9px 11px;
    box-shadow:0 4px 0 #1a1626, inset 0 2px 0 #ffffff22;
    transition:transform .05s, box-shadow .05s; text-align:left; line-height:1.4;
    touch-action:manipulation; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
  }
  button.btn:hover{filter:brightness(1.12);}
  button.btn:active{transform:translateY(3px); box-shadow:0 1px 0 #1a1626;}
  button.btn:disabled{opacity:.4; cursor:not-allowed; box-shadow:0 4px 0 #1a1626;}
  button.btn .cost{color:var(--c-good2); font-size:7px;}
  button.btn.k{flex:1 1 46%;}
  button.btn.primary{background:linear-gradient(#46c46a,#2c9850); box-shadow:0 4px 0 #14401f, inset 0 2px 0 #ffffff33;}
  button.btn.danger{background:linear-gradient(#ff6b8b,#c93a5a); box-shadow:0 4px 0 #4a0d1c, inset 0 2px 0 #ffffff33;}
  button.btn.blue{background:linear-gradient(#5bb6ff,#357fc0); box-shadow:0 4px 0 #143a5a, inset 0 2px 0 #ffffff33;}
  button.btn.wide{flex:1 1 100%; text-align:center;}
  /* ---- title screen ---- */
  .center{align-items:center; justify-content:center; text-align:center; gap:16px; padding:22px;}
  .logo{font-size:26px; color:var(--c-good2); text-shadow:3px 3px 0 var(--c-bad2),6px 6px 0 #00000066; line-height:1.4;}
  .logo small{display:block; font-size:11px; color:var(--c-warn); margin-top:10px; text-shadow:2px 2px 0 #000;}
  .blink{animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  /* ---- edu card ---- */
  .card{background:linear-gradient(#2a2440,#1d1830); border:4px solid var(--c-warn); border-radius:8px; margin:auto; padding:16px; max-width:90%;}
  .card h2{color:var(--c-warn); font-size:13px; margin-bottom:12px;}
  .card .text{font-size:10px; line-height:1.9;}
  .card .src{margin-top:12px; font-size:7px; color:var(--c-frame-dark);}
  .badge{display:inline-block; background:var(--c-good); color:#06321a; font-size:8px; padding:3px 6px; border-radius:4px; margin:3px 4px 0 0;}
  .badge.miss{background:#3a3550; color:#777;}
  /* food cards */
  .foods{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:6px 0;}
  .foodcard{flex:1 1 28%; min-width:120px; background:#241f38; border:3px solid #4b4368; border-radius:6px; padding:8px; text-align:center; cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;}
  .foodcard:hover{border-color:var(--c-warn); transform:translateY(-2px);}
  .foodcard .e{font-size:32px;}
  .foodcard .n{font-size:9px; margin-top:5px; line-height:1.4;}
  /* misc */
  .row{display:flex; gap:8px; flex-wrap:wrap; justify-content:center;}
  .float{position:absolute; font-size:11px; font-family:var(--font); pointer-events:none; animation:floatup 1s ease-out forwards; z-index:60; text-shadow:1px 1px 0 #000;}
  @keyframes floatup{from{transform:translateY(0); opacity:1;}to{transform:translateY(-40px); opacity:0;}}
  #sub{font-size:8px; color:var(--c-frame-dark); text-align:center; margin-top:8px;}
  .toprow{display:flex; gap:8px; align-items:center; justify-content:center; margin-top:6px;}
  .iconbtn{font-family:var(--font); font-size:8px; cursor:pointer; background:#2b2640; color:var(--c-text); border:2px solid #4b4368; border-radius:5px; padding:5px 7px;}
  .iconbtn:hover{border-color:var(--c-warn);}
  table.summary{font-size:9px; border-collapse:collapse; margin:8px auto;}
  table.summary td{padding:4px 9px; border-bottom:1px solid #4b4368;}
  table.summary td:last-child{color:var(--c-good2); text-align:right;}

  /* =========================================================
     MÓVIL / TABLET — pantalla a altura completa y controles grandes
     ========================================================= */
  @media (max-width:640px), (pointer:coarse){
    body{display:block; padding:0; min-height:100vh;}
    #console{width:100%;}
    #screen{
      aspect-ratio:auto;
      height:auto;
      min-height:calc(100vh - 58px);
      min-height:calc(100dvh - 58px);
      overflow:visible;
      border-width:4px; border-radius:0;
      box-shadow:none;
    }
    /* el contenido fluye en vertical y la PÁGINA scrollea si no cabe (nada se recorta) */
    .view{position:static; min-height:calc(100vh - 66px); min-height:calc(100dvh - 66px);}
    #stage{flex:0 0 auto;}
    #menu{flex-shrink:0;}
    #box{max-height:none;}
    /* HUD y barras un poco más legibles: una sola columna, sin cortar texto */
    #hud{font-size:9px; padding:9px 10px;}
    #bars{padding:9px 10px; gap:7px; grid-template-columns:1fr;}
    .bar{font-size:9px;}
    .bar .lbl{width:128px; overflow:visible; text-overflow:clip;}
    .bar .track{height:14px;}
    .bar .num{width:42px;}
    /* texto de diálogo */
    #box{padding:12px 13px;}
    #box .speaker{font-size:11px;}
    #box .text{font-size:12px; line-height:1.85;}
    .card .text{font-size:12px;}
    .card h2{font-size:13px;}
    /* BOTONES grandes para el dedo */
    button.btn{font-size:12px; padding:14px 12px; box-shadow:0 5px 0 #1a1626, inset 0 2px 0 #ffffff22;}
    button.btn:active{transform:translateY(4px); box-shadow:0 1px 0 #1a1626;}
    button.btn .cost{font-size:9px;}
    button.btn.k{flex:1 1 100%;}            /* una acción por fila: objetivo táctil amplio */
    #menu{gap:8px; padding:10px;}
    .iconbtn{font-size:10px; padding:8px 10px;}
    /* tarjetas de comida apiladas y anchas */
    .foods{flex-direction:column;}
    .foodcard{flex:1 1 100%; min-width:0; display:flex; align-items:center; gap:12px; text-align:left; padding:11px;}
    .foodcard .e{font-size:30px;}
    .foodcard .n{font-size:12px; margin-top:0;}
    /* escena compacta: no debe comerse toda la pantalla en móvil */
    #scene{flex:0 0 auto; height:128px; min-height:0; max-height:30vh;}
    .sprite{font-size:50px;}
    .deco{font-size:28px;}
    .logo{font-size:20px;}
    .logo small{font-size:9px;}
    #sub{display:none;}
  }
  /* Pantallas muy estrechas (móviles pequeños): dos acciones por fila para no scrollear tanto */
  @media (max-width:640px) and (min-height:680px){
    button.btn.k{flex:1 1 46%;}
  }
</style>
</head>
<body>
<div id="console">
  <div id="screen" class="scanlines"><div id="game" class="view"></div></div>
  <div class="toprow">
    <button class="iconbtn" id="muteBtn" onclick="toggleMusic()">🔊 Música: OFF</button>
    <button class="iconbtn" onclick="if(confirm('¿Reiniciar el juego?'))location.reload()">↻ Reiniciar</button>
  </div>
  <div id="sub">Juego educativo · Basado en datos reales de los libros del proyecto · No sustituye consejo médico.</div>
</div>

<script>
/* =========================================================================
   VIVIR CON CROHN — Simulador educativo 16-bit
   Datos reales: tabla de alimentos (Dr. García Sieiro), síntomas/diagnóstico/
   tratamiento (Dr. Monés Xiol), enfoque familia/estrés (Jaureguizar & Espina).
   ========================================================================= */

const G = document.getElementById('game');

/* ---------- ESTADO ---------- */
let S = {};
function newState(){
  S = {
    week:1, maxWeeks:52,
    ap:3, apMax:3,
    cdai:90,                 // <150 remisión, 150-250 leve, 251-350 mod, >350 grave
    energia:78, nutricion:75, estres:30, dinero:55,
    tookMed:false, missedStreak:0,
    smoked:false, smokeFreeAllYear:true,
    flare:false, wasFlare:false,
    weeksRemission:0, weeksFlare:0,
    medWeeks:0, goodMeals:0, badMeals:0,
    hospital:0,
    phase:'title',
    eduSeen:{},
    log:[]
  };
}

/* ---------- AUDIO (chiptune simple) ---------- */
let audioCtx=null, musicOn=false, musicTimer=null, noteIdx=0;
const melody=[ // notas (Hz) tipo chiptune alegre
  392,440,523,440,392,330,392,0,
  349,392,440,392,349,294,330,0,
  392,440,523,587,523,440,392,0,
  330,392,330,294,262,294,330,0
];
function ensureAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
function blip(freq,dur,type){ if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type||'square'; o.frequency.value=freq;
  g.gain.value=0.0; o.connect(g); g.connect(audioCtx.destination);
  const t=audioCtx.currentTime;
  g.gain.linearRampToValueAtTime(0.10, t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.start(t); o.stop(t+dur);
}
function sfx(kind){ if(!audioCtx||!musicOn&&kind!=='force'){} ensureAudio();
  if(kind==='ok') blip(660,0.08); else if(kind==='good'){blip(660,0.07);setTimeout(()=>blip(880,0.09),70);}
  else if(kind==='bad'){blip(220,0.18,'sawtooth');} else if(kind==='click') blip(440,0.05);
}
function playMusic(){
  if(!musicOn) return; ensureAudio();
  const n=melody[noteIdx%melody.length];
  if(n>0){ blip(n,0.14,'square'); blip(n/2,0.14,'triangle'); }
  noteIdx++;
  musicTimer=setTimeout(playMusic,180);
}
function toggleMusic(){
  musicOn=!musicOn; ensureAudio();
  document.getElementById('muteBtn').textContent = musicOn? '🔊 Música: ON':'🔊 Música: OFF';
  if(musicOn) playMusic(); else { clearTimeout(musicTimer); }
}

/* ---------- DATOS REALES: ALIMENTOS (tabla del libro de dieta) ---------- */
const FOODS=[
  // cat: good / test / bad ; shape+fill -> sprite pixel-art dibujado
  {n:'Arroz blanco',cat:'good',shape:'bowl',fill:'#ffffff'},
  {n:'Pasta',cat:'good',shape:'bowl',fill:'#ffd86b'},
  {n:'Patata cocida',cat:'good',shape:'round',fill:'#f0d49a'},
  {n:'Pan tostado',cat:'good',shape:'bread',fill:'#d39a5a'},
  {n:'Pan blanco',cat:'good',shape:'bread',fill:'#f0d9a0'},
  {n:'Plátano',cat:'good',shape:'banana',fill:'#ffd445'},
  {n:'Manzana',cat:'good',shape:'round',fill:'#e0392b'},
  {n:'Pera',cat:'good',shape:'round',fill:'#9fc24f'},
  {n:'Merluza a la plancha',cat:'good',shape:'fish',fill:'#eae3d0'},
  {n:'Pollo a la plancha',cat:'good',shape:'meat',fill:'#e8cfa0'},
  {n:'Pavo a la plancha',cat:'good',shape:'meat',fill:'#ecd6ae'},
  {n:'Ternera',cat:'good',shape:'meat',fill:'#b5483f'},
  {n:'Jamón cocido',cat:'good',shape:'meat',fill:'#ff9aa8'},
  {n:'Yogur',cat:'good',shape:'glass',fill:'#fff4e0'},
  {n:'Queso fresco',cat:'good',shape:'round',fill:'#fff7e0'},
  {n:'Zanahoria cocida',cat:'good',shape:'round',fill:'#ff8c3b'},
  {n:'Calabacín cocido',cat:'good',shape:'round',fill:'#7bbf5a'},
  {n:'Tortilla francesa',cat:'good',shape:'egg',fill:'#ffd34d'},
  {n:'Membrillo',cat:'good',shape:'round',fill:'#d98a2b'},
  {n:'Compota de manzana',cat:'good',shape:'bowl',fill:'#d9a25a'},
  {n:'Sémola',cat:'good',shape:'bowl',fill:'#f3e4b0'},
  {n:'Caldo de pollo',cat:'good',shape:'bowl',fill:'#e7c46a'},
  {n:'Tortita de arroz',cat:'good',shape:'round',fill:'#f0e6c0'},
  {n:'Manzanilla',cat:'good',shape:'cup',fill:'#bcd96a'},

  {n:'Lentejas',cat:'test',shape:'bowl',fill:'#8a5a2b'},
  {n:'Garbanzos',cat:'test',shape:'bowl',fill:'#e0b85a'},
  {n:'Guisantes',cat:'test',shape:'bowl',fill:'#6fae3a'},
  {n:'Maíz',cat:'test',shape:'bowl',fill:'#ffd23b'},
  {n:'Naranja',cat:'test',shape:'round',fill:'#ff9a2b'},
  {n:'Kiwi',cat:'test',shape:'round',fill:'#8fbf4a'},
  {n:'Tomate',cat:'test',shape:'round',fill:'#e2402f'},
  {n:'Cebolla',cat:'test',shape:'round',fill:'#efe2c0'},
  {n:'Champiñones',cat:'test',shape:'round',fill:'#d8c4a0'},
  {n:'Coliflor',cat:'test',shape:'veg',fill:'#f0ead8'},
  {n:'Pan integral',cat:'test',shape:'bread',fill:'#9c6b3a'},
  {n:'Gambas',cat:'test',shape:'fish',fill:'#ff8a6a'},
  {n:'Bacalao',cat:'test',shape:'fish',fill:'#eef0e0'},
  {n:'Almendras',cat:'test',shape:'round',fill:'#c9a06a'},
  {n:'Leche desnatada',cat:'test',shape:'glass',fill:'#f4f8ff'},

  {n:'Fritos / Rebozados',cat:'bad',shape:'fries',fill:'#e8b063'},
  {n:'Patatas fritas (bolsa)',cat:'bad',shape:'fries',fill:'#e8b063'},
  {n:'Chorizo / Embutido',cat:'bad',shape:'sausage',fill:'#b1352f'},
  {n:'Tocino / Cerdo graso',cat:'bad',shape:'meat',fill:'#f0a6a6'},
  {n:'Pizza',cat:'bad',shape:'round',fill:'#e8a33b'},
  {n:'Comida picante',cat:'bad',shape:'banana',fill:'#e23b2f'},
  {n:'Pimientos fritos',cat:'bad',shape:'veg',fill:'#4fae3a'},
  {n:'Café',cat:'bad',shape:'cup',fill:'#5a3a1e'},
  {n:'Refresco con gas',cat:'bad',shape:'glass',fill:'#6a3a1e'},
  {n:'Chocolate',cat:'bad',shape:'choco',fill:'#5a3418'},
  {n:'Bollería / Donut',cat:'bad',shape:'round',fill:'#d98a3b'},
  {n:'Cerveza / Alcohol',cat:'bad',shape:'glass',fill:'#f4b740'},
  {n:'Leche entera',cat:'bad',shape:'glass',fill:'#fff9ee'},
  {n:'Mantequilla',cat:'bad',shape:'round',fill:'#ffe06a'},
  {n:'Helado / Nata',cat:'bad',shape:'ice',fill:'#ff9ec2'},
  {n:'Coles',cat:'bad',shape:'veg',fill:'#6fae3a'}
];
function pick(arr,n){ const c=[...arr]; const out=[]; while(out.length<n&&c.length){ out.push(c.splice(Math.floor(Math.random()*c.length),1)[0]); } return out; }

/* =====================================================================
   MOTOR DE SPRITES PIXEL-ART (dibujados a mano, estilo 16-bit)
   Cada sprite es una rejilla de caracteres -> color de la paleta MP.
   '.' o ' ' = transparente.  'X'/'x' = relleno dinámico (comidas).
   ===================================================================== */
const MP={
  '.':null,' ':null,
  o:'#2a2440', k:'#15121f', W:'#fffce8',
  H:'#6b4a2a', h:'#503418',
  S:'#ffcf9e', s:'#e0a878',
  G:'#bcd96a', g:'#9fc24f',
  E:'#2a2440', M:'#c8455f', P:'#ff8fb0',
  B:'#41a6f6', b:'#2a78c0',
  R:'#ef476f', r:'#b13e53',
  N:'#3b2c5a',
  T:'#8a5a32', t:'#5f3c1e',
  Y:'#ffcd4d', y:'#e0a838',
  L:'#5fa83c', l:'#3f7a28',
  C:'#5a3418', c:'#3e2410',
  A:'#ff924c', a:'#d96a26',
  F:'#e8b063', f:'#c98b46',
  w:'#bfe3ff', u:'#8fc8f0',
  D:'#5bc0d0', d:'#3a93a3',
  X:'#ffffff', x:'#cccccc'
};
function shade(hex,f){ f=f||0.72; const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.round(r*f);g=Math.round(g*f);b=Math.round(b*f); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }
function drawGrid(grid,pal,scale){
  scale=scale||6; const h=grid.length, w=grid[0].length;
  const cv=document.createElement('canvas'); cv.width=w*scale; cv.height=h*scale;
  const c=cv.getContext('2d'); c.imageSmoothingEnabled=false;
  for(let y=0;y<h;y++){ const row=grid[y]; for(let xx=0;xx<row.length;xx++){
    const ch=row[xx]; if(ch==='.'||ch===' ')continue; const col=pal[ch]; if(!col)continue;
    c.fillStyle=col; c.fillRect(xx*scale,y*scale,scale,scale);
  }}
  return cv.toDataURL();
}

  S.phase='meal';

    const badLuck = Math.random() < (S.flare?0.7:0.4);
    if(badLuck){
      S.cdai=clamp(S.cdai+6,0,450); S.energia=clamp(S.energia-3,0,100); S.estres=clamp(S.estres+3,0,100);
      S.badMeals++; sound='bad';
      msg=`${f.n} ${foodImg(f,20)} es de "probar tolerancia"... <span class="bad">esta vez te sentó mal</span>. Recuerda: pruébalos en pequeña cantidad. Inflamación ▲.`;
      floatTxt('Sentó mal','#ff77a8');
    } else {
      S.nutricion=clamp(S.nutricion+5,0,100); S.goodMeals++; sound='ok';
      msg=`${f.n} ${foodImg(f,20)} es de "probar tolerancia" y <b>hoy te sentó bien</b>. Nutrición ▲.`;
      floatTxt('+Nutrición','#a7f070');
    }
  } else { // bad
    const hit=S.flare?16:9;
    S.cdai=clamp(S.cdai+hit,0,450); S.energia=clamp(S.energia-4,0,100); S.estres=clamp(S.estres+2,0,100);
    S.nutricion=clamp(S.nutricion+1,0,100); S.badMeals++; sound='bad';
    msg=`${f.n} ${foodImg(f,20)} estaba rico... pero <span class="bad">suele sentar mal</span> en el Crohn (graso/irritante). Inflamación ▲▲${S.flare?' (¡y estás en brote!)':''}.`;
    floatTxt('Inflamación +','#ef476f');
  }
  sfx(sound);
  showBox('🍽️ Has comido', msg, [{t:'CONTINUAR ▶',cls:'primary',fn:'actionPhase()'}]);
}

function flareAdvice(){
  if(S.flare) return '<span class="bad">Estás en brote.</span> Prioriza 💊 medicación y 😴 descanso para bajar el CDAI por debajo de 150.';
  if(!S.tookMed) return 'Consejo: <b>toma tu medicación</b> aunque te sientas bien (adherencia). Reparte tus 3 acciones con cabeza.';
  if(S.dinero<10) return 'Vas justo de dinero 💰. Quizá toca <b>trabajar</b> esta semana.';
  return 'Vas bien. Cuida tu energía, tu ánimo y tu economía. ¿En qué inviertes la semana?';
}
function act(kind){
  if(S.ap<=0) return;
  let msg='';
  if(kind==='med'){
    if(S.dinero<5){ sfx('bad'); return showBox('💊 Sin dinero','No te llega para la medicación esta semana (-5€). Necesitas <b>trabajar</b> primero. Saltarse el tratamiento es arriesgado.',[{t:'◀ Volver',cls:'primary',fn:'actionPhase()'}]); }
    S.tookMed=true; S.dinero-=5; S.cdai=clamp(S.cdai-(S.flare?16:9),0,450); S.medWeeks++; S.missedStreak=0;
    msg='Has tomado tu medicación 💊. La inflamación baja. <b>La constancia es lo que mantiene la remisión.</b>';
    floatTxt('CDAI ▼','#41a6f6'); sfx('good');
  } else if(kind==='rest'){
    S.energia=clamp(S.energia+13,0,100); S.estres=clamp(S.estres-13,0,100); S.cdai=clamp(S.cdai-3,0,450);
    msg='Descansas y recargas pilas 😴. Energía ▲, estrés ▼.'; floatTxt('+Energía','#a7f070'); sfx('ok');
  } else if(kind==='exercise'){
    if(S.flare){ S.energia=clamp(S.energia-4,0,100); S.estres=clamp(S.estres-6,0,100);
      msg='En brote conviene no forzar 🏃. Te desahogas un poco (estrés ▼) pero acabas algo cansado.'; }
    else { S.energia=clamp(S.energia+7,0,100); S.estres=clamp(S.estres-9,0,100);
      msg='Ejercicio suave (pasear, estiramientos) 🏃. Energía ▲, estrés ▼. ¡Bien!'; }
    floatTxt('Estrés ▼','#a7f070'); sfx('ok');
  } else if(kind==='family'){
    S.estres=clamp(S.estres-15,0,100); S.energia=clamp(S.energia+4,0,100); S.cdai=clamp(S.cdai-2,0,450);
    msg='Tiempo con tu familia y amigos 👨‍👩‍👧. El apoyo emocional reduce el estrés y ayuda a sobrellevar la enfermedad.'; floatTxt('Estrés ▼','#a7f070'); sfx('good');
  } else if(kind==='work'){
    S.dinero+=18; S.estres=clamp(S.estres+9,0,100); S.energia=clamp(S.energia-6,0,100);
    msg='Semana de trabajo 💼. +18€, pero el estrés sube y la energía baja. Busca equilibrio.'; floatTxt('+18€','#ffcd75'); sfx('ok');
  } else if(kind==='doctor'){
    const ph=phaseInfo();
    let extra = S.flare? ' El médico ajusta tu tratamiento del brote (CDAI ▼).':' Todo controlado, sigue así.';
    if(S.flare){ S.cdai=clamp(S.cdai-10,0,450); }
    msg=`Revisión médica 🏥. Tu estado: <b>${ph.label}</b> (CDAI ${Math.round(S.cdai)}).${extra}<br><br><span class="info">Recuerda: analíticas (PCR, VSG) y colonoscopia ayudan a vigilar la enfermedad.</span>`;
    sfx('ok');
  }
  S.ap--;
  showBox('Acción realizada', msg, [{t: S.ap>0?'➕ Otra acción':'✅ Terminar semana', cls:'primary', fn: S.ap>0?'actionPhase()':'endWeek()'}, ...(S.ap>0?[{t:'✅ Terminar semana',cls:'blue',fn:'endWeek()'}]:[])]);
}

/* ---------- FIN DE SEMANA: cálculo ---------- */
function endWeek(){
  // primero: evento aleatorio, luego resolución
  maybeEvent(resolveWeek);
}
function resolveWeek(){
  // penalización por no medicarse
  if(!S.tookMed){ S.cdai=clamp(S.cdai+10,0,450); S.missedStreak++; }
  // tabaco activo (si fumó esta semana ya se aplicó; efecto residual leve si fumador)
  // estrés alto y nutrición baja
  if(S.estres>70) S.cdai=clamp(S.cdai+7,0,450);
  if(S.nutricion<30){ S.cdai=clamp(S.cdai+6,0,450); S.energia=clamp(S.energia-4,0,100); }
  if(S.energia<20) S.estres=clamp(S.estres+6,0,100);
  // deriva natural de la vida
  S.energia=clamp(S.energia-5,0,100);
  S.nutricion=clamp(S.nutricion-5,0,100);
  S.estres=clamp(S.estres+4,0,100);
  S.dinero=clamp(S.dinero-7,-50,999);
  if(S.dinero<0) S.estres=clamp(S.estres+5,0,100);
  // si está en remisión y se cuida, el CDAI tiende suavemente a bajar
  if(S.tookMed && S.estres<50 && S.cdai<150) S.cdai=clamp(S.cdai-3,0,450);

  // determinar fase
  const wasFlare=S.flare;
  S.flare = S.cdai>=150;
  if(S.flare) S.weeksFlare++; else S.weeksRemission++;

  // contadores y mensajes de transición
  let transition='';
  if(S.flare && !wasFlare){
    transition='flareStart';
  } else if(!S.flare && wasFlare){
    transition='flareEnd';
  }

  // ingreso hospitalario si brote muy grave
  if(S.cdai>=400){
    S.hospital++;
    return showBox('🚑 Ingreso hospitalario',
      'El brote se ha vuelto muy grave (CDAI '+Math.round(S.cdai)+'). Ingresas unos días para tratamiento intensivo. Te estabilizan, pero es un aviso serio.<br><br><span class="info">Lección: actuar pronto en el brote (medicación, descanso, dieta suave) evita llegar aquí.</span>',
      [{t:'CONTINUAR ▶',cls:'primary',fn:'afterHospital()'}]);
  }

  if(transition==='flareStart'){
    return showEdu('flare', ()=>weekTransition('flareStart'));
  }
  weekTransition(transition);
}
function afterHospital(){
  S.cdai=240; S.energia=clamp(S.energia+20,0,100); S.estres=clamp(S.estres+10,0,100);
  S.flare=true;
  weekTransition('hospital');
}
function weekTransition(kind){
  let speaker='📅 Fin de semana '+S.week, msg='';
  if(kind==='flareStart'){ speaker='🔥 ¡Ha empezado un brote!'; msg='Tu CDAI ha superado 150. Entras en <b>fase de brote</b>. Céntrate en medicación, descanso y dieta suave para recuperar la remisión.'; sfx('bad'); }
  else if(kind==='flareEnd'){ speaker='🌿 ¡Vuelve la calma!'; msg='Has bajado el CDAI por debajo de 150: <b>recuperas la remisión</b>. ¡Gran trabajo! Mantén los buenos hábitos para que dure.'; sfx('good'); }
  else if(kind==='hospital'){ speaker='🏥 Tras el ingreso'; msg='Sales del hospital algo recuperado pero aún en brote. A cuidarse mucho estas semanas.'; }
  else {
    const ph=phaseInfo();
    msg = S.flare
      ? 'Sigues en brote (CDAI '+Math.round(S.cdai)+'). No bajes la guardia: medicación + descanso + dieta suave.'
      : 'Semana en remisión 🌿 (CDAI '+Math.round(S.cdai)+'). Vas por buen camino.';
  }
  S.week++;
  if(S.week>S.maxWeeks){ return showEnding(); }
  showBox(speaker, msg, [{t:'▶ SIGUIENTE SEMANA',cls:'primary',fn:'startWeek()'}]);
}

  ach.push({ok:S.smokeFreeAllYear,t:'🚭 Todo el año sin tabaco'});
  ach.push({ok:S.medWeeks>=42,t:'💊 Adherencia ejemplar (≥42 sem.)'});
  ach.push({ok:S.goodMeals>=S.badMeals*2,t:'🥗 Maestro de la dieta'});
  ach.push({ok:S.weeksRemission>=40,t:'🌿 Año mayormente en calma'});
  ach.push({ok:S.hospital===0,t:'🏥 Sin ingresos hospitalarios'});

  let rank, face, color, finalMsg;
  if(remPct>=80){ rank='¡EXCELENTE!'; face='🥳'; color='var(--c-good2)';
    finalMsg='Has demostrado que <b>se puede vivir muy bien con Crohn</b>. Con buenos hábitos, adherencia y apoyo, la enfermedad se mantiene a raya.'; sfx('good'); }
  else if(remPct>=55){ rank='¡BIEN!'; face='😊'; color='var(--c-warn)';
    finalMsg='Has llevado bien la enfermedad la mayor parte del año. Pequeños ajustes (medicación constante, menos estrés) y lo bordarás.'; }
  else { rank='AÑO DIFÍCIL'; face='💪'; color='var(--c-pink)';
    finalMsg='Ha sido un año con muchos brotes. Lo importante: aprender qué los dispara (saltarse la medicación, tabaco, AINEs, estrés, mala dieta) para mejorar. <b>El Crohn es crónico, pero manejable.</b>'; }

  const achHTML=ach.map(a=>`<span class="badge ${a.ok?'':'miss'}">${a.ok?'✔':'✘'} ${a.t}</span>`).join('');
  render(`<div class="view">
    <div id="box" style="max-height:none;flex:1">
      <div class="speaker" style="text-align:center;color:${color};font-size:13px">${face} ${rank}</div>
      <div style="text-align:center;margin:6px 0">${charImg(96, remPct>=55?'happy':'sad')} <span style="font-size:34px;vertical-align:middle">${face}</span></div>
      <table class="summary">
        <tr><td>Semanas en remisión</td><td>${S.weeksRemission} / ${S.maxWeeks} (${remPct}%)</td></tr>
        <tr><td>Semanas en brote</td><td>${S.weeksFlare}</td></tr>
        <tr><td>Semanas con medicación</td><td>${S.medWeeks}</td></tr>
        <tr><td>Comidas acertadas</td><td>${S.goodMeals}</td></tr>
        <tr><td>Ingresos hospitalarios</td><td>${S.hospital}</td></tr>
      </table>
      <div style="text-align:center;margin:8px 0">${achHTML}</div>
      <div class="text" style="text-align:center">${finalMsg}</div>
      <div class="src" style="text-align:center;margin-top:10px;color:var(--c-frame-dark);font-size:7px">Juego educativo basado en datos reales · No sustituye el consejo de tu médico.</div>
    </div>
    <div id="menu">
      <button class="btn primary k" onclick="showTitle()">🔁 JUGAR DE NUEVO</button>
      <button class="btn blue k" onclick="showEdu('family',showEnding)">📖 Repasar consejos</button>
    </div>
  </div>`);
}

/* ---------- ARRANQUE ---------- */
newState();
showTitle();
</script>
</body>
</html>
